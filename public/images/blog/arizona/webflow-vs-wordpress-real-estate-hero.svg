<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Warm sunset gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF5E6"/>
      <stop offset="40%" stop-color="#FFE0C2"/>
      <stop offset="100%" stop-color="#FFD0A8"/>
    </linearGradient>
    <!-- Desert ground gradient -->
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C89E"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
    <!-- Mountain gradient -->
    <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A0D0"/>
      <stop offset="100%" stop-color="#A07EB0"/>
    </linearGradient>
    <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0A888"/>
      <stop offset="100%" stop-color="#C88868"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sun" cx="0.5" cy="0.35" r="0.4">
      <stop offset="0%" stop-color="#FFDD88" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFE8B0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFF5E6" stop-opacity="0"/>
    </radialGradient>
    <!-- Brand accent -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF8F5E"/>
    </linearGradient>
    <!-- Subtle noise filter -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="" mode="normal"/>
    </filter>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="0.8" fill="#000" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="675" fill="url(#sky)"/>

  <!-- Sun glow -->
  <rect width="1200" height="675" fill="url(#sun)"/>

  <!-- Far mountain range - purple/mauve -->
  <path d="M0 420 L80 340 L180 380 L300 280 L420 350 L500 300 L580 260 L680 320 L800 240 L900 290 L1000 260 L1100 320 L1200 280 L1200 420 Z" fill="url(#mtn1)" opacity="0.4"/>

  <!-- Mid mountain range - warm terracotta -->
  <path d="M0 440 L100 380 L200 410 L350 340 L450 390 L550 360 L700 310 L850 370 L950 340 L1050 380 L1200 350 L1200 440 Z" fill="url(#mtn2)" opacity="0.5"/>

  <!-- Desert ground plane -->
  <rect x="0" y="430" width="1200" height="245" fill="url(#ground)" opacity="0.6"/>

  <!-- Geometric house - clean, minimal, modern -->
  <!-- Main body -->
  <rect x="480" y="350" width="160" height="90" rx="2" fill="#FEFCF8" stroke="#E0D0C0" stroke-width="1"/>
  <!-- Flat roof overhang -->
  <rect x="470" y="345" width="180" height="8" rx="1" fill="#555" opacity="0.7"/>
  <!-- Second floor box -->
  <rect x="560" y="305" width="90" height="48" rx="2" fill="#FEFCF8" stroke="#E0D0C0" stroke-width="1"/>
  <rect x="555" y="300" width="100" height="8" rx="1" fill="#555" opacity="0.7"/>
  <!-- Large window -->
  <rect x="502" y="365" width="50" height="60" rx="1" fill="#B8D8E8" opacity="0.6"/>
  <line x1="527" y1="365" x2="527" y2="425" stroke="#FEFCF8" stroke-width="1.5"/>
  <line x1="502" y1="395" x2="552" y2="395" stroke="#FEFCF8" stroke-width="1.5"/>
  <!-- Door - brand accent color -->
  <rect x="575" y="395" width="24" height="45" rx="1" fill="url(#accent)"/>
  <circle cx="594" cy="418" r="2" fill="#FFF" opacity="0.8"/>
  <!-- Upper windows -->
  <rect x="575" y="315" width="25" height="25" rx="1" fill="#B8D8E8" opacity="0.5"/>
  <rect x="610" y="315" width="25" height="25" rx="1" fill="#FFE088" opacity="0.4"/>

  <!-- Saguaro cactus left -->
  <g opacity="0.55">
    <rect x="248" y="340" width="8" height="100" rx="4" fill="#5A8A5A"/>
    <!-- left arm -->
    <rect x="228" y="370" width="24" height="7" rx="3" fill="#5A8A5A"/>
    <rect x="228" y="340" width="7" height="34" rx="3" fill="#5A8A5A"/>
    <!-- right arm -->
    <rect x="252" y="355" width="20" height="7" rx="3" fill="#5A8A5A"/>
    <rect x="267" y="330" width="7" height="30" rx="3" fill="#5A8A5A"/>
  </g>

  <!-- Saguaro cactus right -->
  <g opacity="0.45">
    <rect x="880" y="360" width="7" height="80" rx="3" fill="#5A8A5A"/>
    <rect x="862" y="385" width="22" height="6" rx="3" fill="#5A8A5A"/>
    <rect x="862" y="360" width="6" height="28" rx="3" fill="#5A8A5A"/>
    <rect x="884" y="375" width="18" height="6" rx="3" fill="#5A8A5A"/>
    <rect x="898" y="350" width="6" height="28" rx="3" fill="#5A8A5A"/>
  </g>

  <!-- Small bush clusters -->
  <ellipse cx="380" cy="445" rx="20" ry="12" fill="#6B9B6B" opacity="0.35"/>
  <ellipse cx="720" cy="448" rx="16" ry="10" fill="#6B9B6B" opacity="0.3"/>
  <ellipse cx="160" cy="455" rx="14" ry="9" fill="#6B9B6B" opacity="0.25"/>
  <ellipse cx="1020" cy="450" rx="18" ry="11" fill="#6B9B6B" opacity="0.28"/>

  <!-- Abstract geometric accent shapes - floating -->
  <!-- Circle - warm -->
  <circle cx="120" cy="180" r="40" fill="#FF6B35" opacity="0.08"/>
  <circle cx="120" cy="180" r="25" fill="#FF6B35" opacity="0.06"/>
  <!-- Circle - cool -->
  <circle cx="1060" cy="150" r="35" fill="#6BA5C8" opacity="0.08"/>
  <!-- Small decorative dots -->
  <circle cx="300" cy="250" r="4" fill="#FF6B35" opacity="0.15"/>
  <circle cx="320" cy="240" r="2.5" fill="#FF6B35" opacity="0.12"/>
  <circle cx="900" cy="220" r="3.5" fill="#6BA5C8" opacity="0.12"/>
  <circle cx="920" cy="235" r="2" fill="#6BA5C8" opacity="0.1"/>

  <!-- Thin horizon line -->
  <line x1="0" y1="432" x2="1200" y2="432" stroke="#C0A080" stroke-width="0.5" opacity="0.3"/>

  <!-- Subtle dot texture overlay -->
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Very light grain texture -->
  <rect width="1200" height="675" filter="url(#grain)" opacity="0.3"/>
</svg>
