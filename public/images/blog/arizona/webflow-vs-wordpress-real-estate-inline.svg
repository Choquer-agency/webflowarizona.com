<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF9B6B"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#6BB5E8"/>
    </linearGradient>
    <radialGradient id="glow-warm" cx="0.3" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cool" cx="0.7" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#000" stroke-width="0.3" opacity="0.04"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#000" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow-warm)"/>
  <rect width="1200" height="675" fill="url(#glow-cool)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Center dividing line - thin, elegant -->
  <line x1="600" y1="100" x2="600" y2="575" stroke="#DDD" stroke-width="0.5" stroke-dasharray="4,8"/>

  <!-- LEFT SIDE: Webflow (warm/orange) -->

  <!-- Abstract browser window - Webflow -->
  <g transform="translate(160, 140)">
    <!-- Window frame -->
    <rect width="320" height="220" rx="8" fill="#FFF" stroke="#E8E0D8" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="320" height="32" rx="8" fill="#FAFAFA"/>
    <rect y="24" width="320" height="8" fill="#FAFAFA"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="16" r="5" fill="#FF5F57" opacity="0.7"/>
    <circle cx="38" cy="16" r="5" fill="#FFBD2E" opacity="0.7"/>
    <circle cx="56" cy="16" r="5" fill="#28C840" opacity="0.7"/>

    <!-- Content area - abstract layout blocks showing visual design -->
    <!-- Hero image area -->
    <rect x="16" y="44" width="288" height="80" rx="4" fill="url(#warm)" opacity="0.15"/>
    <!-- Abstract shape suggesting rich visual -->
    <circle cx="160" cy="84" r="28" fill="#FF6B35" opacity="0.12"/>
    <rect x="120" y="68" width="80" height="32" rx="16" fill="#FF6B35" opacity="0.08"/>

    <!-- Clean content blocks -->
    <rect x="16" y="136" width="180" height="6" rx="3" fill="#333" opacity="0.15"/>
    <rect x="16" y="150" width="140" height="4" rx="2" fill="#333" opacity="0.08"/>
    <rect x="16" y="162" width="160" height="4" rx="2" fill="#333" opacity="0.08"/>

    <!-- CTA button -->
    <rect x="16" y="180" width="80" height="24" rx="4" fill="url(#warm)" opacity="0.8"/>

    <!-- Speed indicator - fast -->
    <g transform="translate(220, 140)">
      <circle cx="40" cy="30" r="26" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.2"/>
      <path d="M40 8 A26 26 0 1 1 16 44" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <text x="40" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FF6B35" opacity="0.8">98</text>
    </g>
  </g>

  <!-- Webflow label -->
  <text x="320" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#FF6B35" opacity="0.6" letter-spacing="0.05em">WEBFLOW</text>

  <!-- Small abstract property cards - Webflow side -->
  <g transform="translate(180, 420)">
    <rect width="110" height="70" rx="4" fill="#FFF" stroke="#F0E8E0" stroke-width="1"/>
    <rect x="6" y="6" width="98" height="35" rx="2" fill="#FF6B35" opacity="0.08"/>
    <rect x="6" y="48" width="60" height="4" rx="2" fill="#333" opacity="0.12"/>
    <rect x="6" y="56" width="40" height="3" rx="1.5" fill="#333" opacity="0.06"/>
  </g>
  <g transform="translate(310, 420)">
    <rect width="110" height="70" rx="4" fill="#FFF" stroke="#F0E8E0" stroke-width="1"/>
    <rect x="6" y="6" width="98" height="35" rx="2" fill="#FF6B35" opacity="0.08"/>
    <rect x="6" y="48" width="60" height="4" rx="2" fill="#333" opacity="0.12"/>
    <rect x="6" y="56" width="40" height="3" rx="1.5" fill="#333" opacity="0.06"/>
  </g>

  <!-- RIGHT SIDE: WordPress (cool/blue) -->

  <!-- Abstract browser window - WordPress -->
  <g transform="translate(720, 140)">
    <rect width="320" height="220" rx="8" fill="#FFF" stroke="#E0E0E8" stroke-width="1.5"/>
    <rect width="320" height="32" rx="8" fill="#FAFAFA"/>
    <rect y="24" width="320" height="8" fill="#FAFAFA"/>
    <circle cx="20" cy="16" r="5" fill="#FF5F57" opacity="0.7"/>
    <circle cx="38" cy="16" r="5" fill="#FFBD2E" opacity="0.7"/>
    <circle cx="56" cy="16" r="5" fill="#28C840" opacity="0.7"/>

    <!-- Content - more cluttered, plugin-heavy feel -->
    <!-- Sidebar -->
    <rect x="230" y="44" width="74" height="164" rx="2" fill="#4A90D9" opacity="0.06"/>
    <rect x="238" y="54" width="58" height="4" rx="2" fill="#333" opacity="0.08"/>
    <rect x="238" y="64" width="50" height="4" rx="2" fill="#333" opacity="0.06"/>
    <rect x="238" y="74" width="54" height="4" rx="2" fill="#333" opacity="0.06"/>
    <rect x="238" y="88" width="58" height="30" rx="2" fill="#4A90D9" opacity="0.08"/>
    <rect x="238" y="124" width="58" height="4" rx="2" fill="#333" opacity="0.06"/>
    <rect x="238" y="134" width="50" height="4" rx="2" fill="#333" opacity="0.06"/>

    <!-- Main content area -->
    <rect x="16" y="44" width="200" height="50" rx="3" fill="#4A90D9" opacity="0.08"/>
    <rect x="16" y="104" width="160" height="5" rx="2.5" fill="#333" opacity="0.12"/>
    <rect x="16" y="116" width="180" height="4" rx="2" fill="#333" opacity="0.06"/>
    <rect x="16" y="126" width="140" height="4" rx="2" fill="#333" opacity="0.06"/>
    <rect x="16" y="136" width="170" height="4" rx="2" fill="#333" opacity="0.06"/>

    <!-- Plugin badges/clutter -->
    <rect x="16" y="155" width="50" height="16" rx="3" fill="#4A90D9" opacity="0.12"/>
    <rect x="72" y="155" width="45" height="16" rx="3" fill="#4A90D9" opacity="0.08"/>
    <rect x="123" y="155" width="55" height="16" rx="3" fill="#4A90D9" opacity="0.1"/>

    <!-- Speed indicator - slower -->
    <g transform="translate(220, 140)">
      <circle cx="40" cy="30" r="26" fill="none" stroke="#4A90D9" stroke-width="2" opacity="0.2"/>
      <path d="M40 8 A26 26 0 0 1 62 20" fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <text x="40" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A90D9" opacity="0.7">62</text>
    </g>
  </g>

  <!-- WordPress label -->
  <text x="880" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#4A90D9" opacity="0.5" letter-spacing="0.05em">WORDPRESS</text>

  <!-- Small property cards - WordPress side (more template-y) -->
  <g transform="translate(740, 420)">
    <rect width="110" height="70" rx="4" fill="#FFF" stroke="#E0E0E8" stroke-width="1"/>
    <rect x="6" y="6" width="98" height="35" rx="2" fill="#4A90D9" opacity="0.06"/>
    <rect x="6" y="48" width="60" height="4" rx="2" fill="#333" opacity="0.1"/>
    <rect x="6" y="56" width="40" height="3" rx="1.5" fill="#333" opacity="0.05"/>
  </g>
  <g transform="translate(870, 420)">
    <rect width="110" height="70" rx="4" fill="#FFF" stroke="#E0E0E8" stroke-width="1"/>
    <rect x="6" y="6" width="98" height="35" rx="2" fill="#4A90D9" opacity="0.06"/>
    <rect x="6" y="48" width="60" height="4" rx="2" fill="#333" opacity="0.1"/>
    <rect x="6" y="56" width="40" height="3" rx="1.5" fill="#333" opacity="0.05"/>
  </g>

  <!-- "VS" in center -->
  <text x="600" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="300" fill="#BBB" letter-spacing="0.1em">vs</text>

  <!-- Decorative floating elements -->
  <circle cx="600" cy="80" r="3" fill="#DDD"/>
  <circle cx="600" cy="600" r="3" fill="#DDD"/>
  <circle cx="80" cy="340" r="30" fill="#FF6B35" opacity="0.04"/>
  <circle cx="1120" cy="340" r="30" fill="#4A90D9" opacity="0.04"/>

  <!-- Subtle corner accents -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#FF6B35" stroke-width="1" opacity="0.15"/>
  <line x1="40" y1="40" x2="40" y2="100" stroke="#FF6B35" stroke-width="1" opacity="0.15"/>
  <line x1="1160" y1="635" x2="1100" y2="635" stroke="#4A90D9" stroke-width="1" opacity="0.15"/>
  <line x1="1160" y1="635" x2="1160" y2="575" stroke="#4A90D9" stroke-width="1" opacity="0.15"/>
</svg>
